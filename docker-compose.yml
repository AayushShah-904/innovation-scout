version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: innovation_vector_db
    environment:
      POSTGRES_DB: innovation_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: 12345
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d innovation_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: